name: 일일 제재정보 스크래핑 & 이메일 발송

on:
  schedule:
    # 6시간 간격 실행 (KST 06:00 / 12:00 / 18:00 / 00:00)
    - cron: "0 21,3,9,15 * * *"
  workflow_dispatch:
    # 수동 실행 버튼 (테스트용)

jobs:
  scrape-and-email:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 스크래퍼 실행
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          TZ: Asia/Seoul
        run: python main.py

      - name: 수집 상태 저장 (state.json)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update scrape state [skip ci]"
          git push

      - name: 실행 결과 업로드 (디버깅용)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          retention-days: 7
          path: "*.log"
