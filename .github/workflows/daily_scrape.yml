name: 일일 제재정보 스크래핑 & 이메일 발송

on:
  schedule:
    # 매일 오전 6시 KST = 21:00 UTC (전날)
    - cron: "0 21 * * *"
  workflow_dispatch:
    # 수동 실행 버튼 (테스트용)

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 스크래퍼 실행
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          TZ: Asia/Seoul
        run: python main.py

      - name: 실행 결과 업로드 (디버깅용)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          retention-days: 7
          path: "*.log"
